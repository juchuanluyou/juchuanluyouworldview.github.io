<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾琳·星语 · 角色详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f8f8fc;
            color: #1e1e2a;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6C3CE1, #E94E8C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-decoration: none;
        }

        .nav-links a {
            margin-left: 32px;
            text-decoration: none;
            color: #1e1e2a;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #6C3CE1;
        }

        .nav-links .btn-back {
            border: 1.5px solid #6C3CE1;
            color: #6C3CE1;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .nav-links .btn-back:hover {
            background: #6C3CE1;
            color: white;
        }

        /* 角色详情主区域 */
        .character-detail {
            display: flex;
            gap: 60px;
            padding: 60px 0;
            align-items: flex-start;
        }

        .character-image {
            flex: 1;
            min-height: 400px;
            background: linear-gradient(145deg, #e8e4f0, #d5cfe0);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }

        .character-info {
            flex: 1;
        }

        .character-info .name {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .character-info .role-tag {
            display: inline-block;
            margin-top: 8px;
            background: #6C3CE1;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .character-info .description {
            margin-top: 24px;
            font-size: 1.1rem;
            color: #4a4a5e;
            line-height: 1.8;
        }

        .character-info .meta {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid #eaeaef;
        }

        .character-info .meta span {
            display: inline-block;
            margin-right: 30px;
            color: #6a6a82;
            font-size: 0.95rem;
        }

        .character-info .meta i {
            color: #6C3CE1;
            margin-right: 6px;
        }

        /* 返回按钮 */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #6C3CE1;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-4px);
        }

        .back-link i {
            margin-right: 8px;
        }

        /* 页脚 */
        .footer {
            border-top: 1px solid #ececf0;
            padding: 30px 0;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            color: #5a5a72;
            font-size: 0.9rem;
        }

        .footer .social a {
            color: #1e1e2a;
            margin-left: 24px;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .footer .social a:hover {
            color: #6C3CE1;
        }

        @media (max-width: 768px) {
            .character-detail {
                flex-direction: column;
                gap: 30px;
                padding: 30px 0;
            }
            .character-image {
                min-height: 250px;
                font-size: 5rem;
                width: 100%;
            }
            .character-info .name {
                font-size: 2.2rem;
            }
            .container {
                padding: 0 20px;
            }
            .nav-links a {
                margin-left: 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav class="container navbar">
    <a href="index.html" class="logo">✦ 灵感</a>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#characters">角色</a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 返回</a>
    </div>
</nav>

<!-- 角色详情 -->
<section class="container character-detail">
    <!-- 左侧：角色大图 -->
    <div class="character-image">
        <img src="images/Chuanyousenli.Characterdesign.png" 
         alt="川囿森里" 
         style="width:100%; height:100%; object-fit:cover; border-radius:32px;">
    </div>
    <!-- 右侧：角色信息 -->
    <div class="character-info">
        <h1 class="name">川囿森里</h1>
        <span class="role-tag">女巫</span>
        
        <p class="description">
            川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍。      </p>
        <p class="description">
            川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍川囿森里介绍。
        </p>

        <div class="meta">
            <span><i class="fas fa-map-pin"></i> 上海 · 中国</span>
            <span><i class="fas fa-briefcase"></i> 6年设计经验</span>
            <span><i class="fas fa-heart" style="color:#E94E8C;"></i> 幻想 · 极简</span>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 回到角色列表</a>
    </div>
</section>

<!-- 页脚 -->
<footer class="container footer">
    <span>© 2026 灵感工作室 · 用设计连接世界</span>
    <div class="social">
        <a href="#"><i class="fab fa-behance"></i></a>
        <a href="#"><i class="fab fa-dribbble"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
    </div>
</footer>

</body>
</html>
