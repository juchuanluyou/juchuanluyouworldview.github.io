<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>匿名提问箱 · 橘川鹿囿</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f3f8;
            color: #1e1e2a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6C3CE1, #E94E8C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            margin-left: 24px;
            text-decoration: none;
            color: #1e1e2a;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #6C3CE1; }

        .nav-links .btn-back {
            border: 1.5px solid #6C3CE1;
            color: #6C3CE1;
            padding: 6px 18px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-links .btn-back:hover {
            background: #6C3CE1;
            color: #fff;
        }

        /* ===== 页面头部 ===== */
        .page-header {
            text-align: center;
            padding: 40px 0 20px 0;
        }
        .page-header h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .page-header p {
            color: #6a6a82;
            font-size: 1.1rem;
            margin-top: 6px;
        }

        /* ===== 提问表单 ===== */
        .question-form {
            background: #ffffff;
            border-radius: 24px;
            padding: 28px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            margin: 16px 0 32px 0;
            border: 1px solid rgba(108, 60, 225, 0.08);
        }

        .question-form textarea {
            width: 100%;
            border: 1.5px solid #e4e2ea;
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
            background: #faf9fc;
            color: #1e1e2a;
        }
        .question-form textarea:focus {
            outline: none;
            border-color: #6C3CE1;
            background: #fff;
        }
        .question-form textarea::placeholder {
            color: #aaaabf;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .form-actions .hint {
            color: #8a8aa0;
            font-size: 0.85rem;
        }
        .form-actions .hint i {
            margin-right: 6px;
        }

        .btn-submit {
            background: #6C3CE1;
            color: #fff;
            border: none;
            padding: 12px 40px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(108, 60, 225, 0.25);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(108, 60, 225, 0.35);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }

        /* ===== 留言列表 ===== */
        .messages-section {
            margin: 12px 0 40px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .section-header .count {
            color: #8a8aa0;
            font-size: 0.9rem;
        }

        /* 单条留言卡片 */
        .message-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: border-color 0.2s;
        }
        .message-card:hover {
            border-color: rgba(108, 60, 225, 0.15);
        }

        .message-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #8a8aa0;
        }
        .message-card .meta .anonymous {
            font-weight: 600;
            color: #6C3CE1;
        }
        .message-card .meta .time {
            font-size: 0.8rem;
        }

        .message-card .content {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #1e1e2a;
            word-break: break-word;
        }

        /* ----- 回复区域（仅作者可见） ----- */
        .reply-area {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed #ececf0;
        }

        .reply-area .reply-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #6C3CE1;
            margin-bottom: 6px;
        }
        .reply-area .reply-label i {
            margin-right: 4px;
        }

        .reply-area .reply-text {
            background: #f6f4fa;
            border-radius: 12px;
            padding: 12px 16px;
            color: #1e1e2a;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .reply-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .reply-input-group input {
            flex: 1;
            min-width: 160px;
            border: 1.5px solid #e4e2ea;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.9rem;
            background: #faf9fc;
            transition: border-color 0.2s;
        }
        .reply-input-group input:focus {
            outline: none;
            border-color: #6C3CE1;
        }
        .reply-input-group input::placeholder {
            color: #b0b0c4;
        }

        .btn-reply {
            background: #6C3CE1;
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reply:hover {
            background: #5a2fc9;
        }

        .btn-delete {
            background: transparent;
            color: #b0b0c4;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .btn-delete:hover {
            color: #E94E8C;
            background: #fef0f4;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8a8aa0;
        }
        .empty-state i {
            font-size: 3rem;
            color: #d5d0e0;
            margin-bottom: 16px;
            display: block;
        }
        .empty-state p {
            font-size: 1.05rem;
        }

        /* ===== 页脚 ===== */
        .footer {
            border-top: 1px solid #ececf0;
            padding: 24px 0;
            margin-top: auto;
            text-align: center;
            color: #8a8aa0;
            font-size: 0.85rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .page-header h1 { font-size: 2rem; }
            .question-form { padding: 20px; }
            .form-actions { flex-direction: column; align-items: stretch; }
            .btn-submit { width: 100%; justify-content: center; }
            .nav-links a { margin-left: 14px; font-size: 0.85rem; }
            .nav-links .btn-back { padding: 4px 14px; }
        }
    </style>
</head>
<body>

<!-- ===== 导航栏 ===== -->
<nav class="container navbar">
    <a href="index.html" class="logo">✦ 橘川鹿囿</a>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#characters">角色</a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 返回</a>
    </div>
</nav>

<!-- ===== 页面主体 ===== -->
<div class="container">

    <!-- 头部 -->
    <div class="page-header">
        <h1>📬 匿名提问箱</h1>
        <p>写下你想问的问题 · 我会逐个回复 ✨</p>
    </div>

    <!-- 提问表单 -->
    <div class="question-form">
        <textarea id="questionInput" placeholder="输入你想问的问题…（匿名，不会被公开身份）"></textarea>
        <div class="form-actions">
            <span class="hint"><i class="fas fa-user-secret"></i> 匿名提问，只有我能看到</span>
            <button class="btn-submit" onclick="submitQuestion()">
                <i class="fas fa-paper-plane" style="margin-right:8px;"></i>提交问题
            </button>
        </div>
    </div>

    <!-- 留言列表 -->
    <div class="messages-section">
        <div class="section-header">
            <h2>💬 收到的提问</h2>
            <span class="count" id="messageCount">共 0 条</span>
        </div>
        <div id="messageList">
            <!-- 由 JavaScript 动态渲染 -->
        </div>
    </div>
</div>

<!-- ===== 页脚 ===== -->
<footer class="container footer">
    <span>© 2026 橘川鹿囿 · 匿名提问箱</span>
</footer>

<!-- ============================================================ -->
<!-- JavaScript：数据存储 + 渲染 + 回复/删除（仅作者可操作） -->
<!-- ============================================================ -->
<script>
    // ---------- 数据存储 key ----------
    const STORAGE_KEY = 'juchuan_question_box';

    // ---------- 读取 / 写入数据 ----------
    function loadMessages() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch {
            return [];
        }
    }

    function saveMessages(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    // ---------- 生成短 ID ----------
    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // ---------- 获取当前时间字符串 ----------
    function getTimeStr() {
        const d = new Date();
        return d.getFullYear() + '-' +
               String(d.getMonth()+1).padStart(2,'0') + '-' +
               String(d.getDate()).padStart(2,'0') + ' ' +
               String(d.getHours()).padStart(2,'0') + ':' +
               String(d.getMinutes()).padStart(2,'0');
    }

    // ---------- 提交新提问 ----------
    function submitQuestion() {
        const input = document.getElementById('questionInput');
        const text = input.value.trim();
        if (!text) {
            alert('✏️ 请先输入你的问题～');
            return;
        }

        const list = loadMessages();
        list.push({
            id: generateId(),
            content: text,
            time: getTimeStr(),
            reply: null,        // null 表示未回复，字符串表示已回复
        });
        saveMessages(list);
        input.value = '';
        renderMessages();
    }

    // ---------- 回复（仅作者） ----------
    function replyMessage(id) {
        const input = document.getElementById('reply_input_' + id);
        const text = input.value.trim();
        if (!text) {
            alert('✏️ 请输入回复内容～');
            return;
        }

        const list = loadMessages();
        const item = list.find(m => m.id === id);
        if (item) {
            item.reply = text;
            saveMessages(list);
            renderMessages();
        }
    }

    // ---------- 删除（仅作者） ----------
    function deleteMessage(id) {
        if (!confirm('确定要删除这条提问吗？')) return;
        let list = loadMessages();
        list = list.filter(m => m.id !== id);
        saveMessages(list);
        renderMessages();
    }

    // ---------- 渲染留言列表 ----------
    function renderMessages() {
        const list = loadMessages();
        const container = document.getElementById('messageList');
        const countEl = document.getElementById('messageCount');

        countEl.textContent = '共 ' + list.length + ' 条';

        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>还没有提问～ 快来写下第一个问题吧！</p>
                </div>
            `;
            return;
        }

        // 按时间倒序（最新的在前）
        const sorted = [...list].reverse();

        let html = '';
        sorted.forEach(m => {
            const hasReply = m.reply && m.reply.trim().length > 0;

            html += `
                <div class="message-card" data-id="${m.id}">
                    <div class="meta">
                        <span class="anonymous"><i class="fas fa-user-secret"></i> 匿名用户</span>
                        <span class="time"><i class="far fa-clock"></i> ${m.time}</span>
                    </div>
                    <div class="content">${escapeHtml(m.content)}</div>

                    <!-- 回复区域 -->
                    <div class="reply-area">
                        ${hasReply ? `
                            <div class="reply-label"><i class="fas fa-reply"></i> 我的回复</div>
                            <div class="reply-text">${escapeHtml(m.reply)}</div>
                        ` : `
                            <div class="reply-label" style="color:#b0b0c4;"><i class="fas fa-hourglass-half"></i> 等待回复中…</div>
                        `}

                        <!-- 回复输入框（仅作者可见） -->
                        <div class="reply-input-group" style="margin-top:8px;">
                            <input type="text" id="reply_input_${m.id}" placeholder="写下回复…（仅你可见）" />
                            <button class="btn-reply" onclick="replyMessage('${m.id}')">
                                <i class="fas fa-reply"></i> 回复
                            </button>
                            <button class="btn-delete" onclick="deleteMessage('${m.id}')" title="删除">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ---------- 简单防 XSS 转义 ----------
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ---------- 页面加载时渲染 ----------
    document.addEventListener('DOMContentLoaded', renderMessages);
</script>

</body>
</html>
