<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>社区留言板 · 橘川鹿囿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f3f8; color: #1e1e2a; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 860px; margin: 0 auto; padding: 0 24px; width: 100%; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #6C3CE1, #E94E8C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; letter-spacing: -0.5px; }
        .nav-links a { margin-left: 24px; text-decoration: none; color: #1e1e2a; font-weight: 500; font-size: 0.95rem; transition: color 0.2s; }
        .nav-links a:hover { color: #6C3CE1; }
        .nav-links .btn-back { border: 1.5px solid #6C3CE1; color: #6C3CE1; padding: 6px 18px; border-radius: 40px; transition: all 0.2s; }
        .nav-links .btn-back:hover { background: #6C3CE1; color: #fff; }
        .admin-bar { background: #fff8e7; border: 1px solid #f0dca0; border-radius: 12px; padding: 10px 18px; margin: 10px 0 16px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .admin-bar .status { font-size: 0.85rem; color: #8a7a40; }
        .admin-bar .status i { margin-right: 6px; }
        .admin-bar input { border: 1.5px solid #e4d8b0; border-radius: 40px; padding: 5px 16px; font-size: 0.85rem; width: 160px; background: #fffdf5; }
        .admin-bar input:focus { outline: none; border-color: #6C3CE1; }
        .admin-bar .btn-admin { background: #6C3CE1; color: #fff; border: none; padding: 5px 20px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; }
        .admin-bar .btn-admin:hover { background: #5a2fc9; }
        .admin-bar .btn-admin.logout { background: #e0d8e8; color: #4a4a5e; }
        .admin-bar .btn-admin.logout:hover { background: #d0c8d8; }
        .page-header { text-align: center; padding: 30px 0 12px 0; }
        .page-header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; }
        .page-header p { color: #6a6a82; font-size: 1rem; margin-top: 4px; }
        .identity-bar { background: #ffffff; border-radius: 16px; padding: 12px 20px; margin: 12px 0 18px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(108,60,225,0.06); }
        .identity-bar label { font-weight: 600; font-size: 0.9rem; color: #4a4a5e; }
        .identity-bar input { flex: 1; min-width: 120px; border: 1.5px solid #e4e2ea; border-radius: 40px; padding: 7px 16px; font-size: 0.92rem; background: #faf9fc; transition: border-color 0.2s; }
        .identity-bar input:focus { outline: none; border-color: #6C3CE1; }
        .identity-bar .badge { background: #6C3CE1; color: #fff; padding: 3px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .post-form { background: #ffffff; border-radius: 24px; padding: 22px 26px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); margin: 0 0 24px 0; border: 1px solid rgba(108,60,225,0.08); }
        .post-form textarea { width: 100%; border: 1.5px solid #e4e2ea; border-radius: 16px; padding: 14px 18px; font-size: 1rem; resize: vertical; min-height: 80px; transition: border-color 0.2s; background: #faf9fc; color: #1e1e2a; }
        .post-form textarea:focus { outline: none; border-color: #6C3CE1; background: #fff; }
        .post-form textarea::placeholder { color: #aaaabf; }
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 10px; }
        .form-actions .hint { color: #8a8aa0; font-size: 0.82rem; }
        .btn-submit { background: #6C3CE1; color: #fff; border: none; padding: 10px 34px; border-radius: 60px; font-weight: 600; font-size: 0.92rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; box-shadow: 0 6px 20px rgba(108,60,225,0.25); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,60,225,0.35); }
        .btn-submit:active { transform: scale(0.97); }
        .posts-section { margin: 8px 0 40px 0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 6px; }
        .section-header h2 { font-size: 1.2rem; font-weight: 600; }
        .section-header .count { color: #8a8aa0; font-size: 0.85rem; }
        .post-card { background: #ffffff; border-radius: 20px; padding: 18px 22px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.04); transition: border-color 0.2s; }
        .post-card:hover { border-color: rgba(108,60,225,0.10); }
        .post-card .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.82rem; color: #8a8aa0; flex-wrap: wrap; gap: 4px; }
        .post-card .meta .name { font-weight: 600; color: #6C3CE1; }
        .post-card .meta .name.anonymous { color: #b0b0c4; }
        .post-card .meta .time { font-size: 0.75rem; }
        .post-card .content { font-size: 1rem; line-height: 1.7; color: #1e1e2a; word-break: break-word; margin: 6px 0 8px 0; }
        .interact-bar { display: flex; align-items: center; gap: 16px; padding: 8px 0 4px 0; border-top: 1px solid #f0eef4; margin-top: 8px; flex-wrap: wrap; }
        .btn-like { background: transparent; border: none; font-size: 0.9rem; padding: 4px 10px; border-radius: 40px; cursor: pointer; transition: all 0.2s; color: #8a8aa0; display: flex; align-items: center; gap: 6px; }
        .btn-like:hover { color: #E94E8C; background: #fef0f4; }
        .btn-like.liked { color: #E94E8C; }
        .btn-like .count { font-weight: 600; font-size: 0.85rem; }
        .btn-comment-toggle { background: transparent; border: none; font-size: 0.85rem; padding: 4px 10px; border-radius: 40px; cursor: pointer; transition: all 0.2s; color: #8a8aa0; display: flex; align-items: center; gap: 6px; }
        .btn-comment-toggle:hover { color: #6C3CE1; background: #f0ecf8; }
        .btn-delete-post { background: transparent; border: none; font-size: 0.78rem; padding: 4px 10px; border-radius: 40px; cursor: pointer; transition: all 0.2s; color: #b0b0c4; margin-left: auto; }
        .btn-delete-post:hover { color: #E94E8C; background: #fef0f4; }
        .comments-area { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ececf0; display: none; }
        .comments-area.open { display: block; }
        .comment-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0 8px 12px; border-left: 3px solid #6C3CE1; margin-bottom: 6px; background: #faf9fc; border-radius: 0 12px 12px 0; padding-right: 12px; }
        .comment-item .comment-body { flex: 1; }
        .comment-item .comment-name { font-weight: 600; font-size: 0.82rem; color: #b0b0c4; }
        .comment-item .comment-text { font-size: 0.92rem; color: #1e1e2a; margin-top: 1px; }
        .comment-item .comment-time { font-size: 0.7rem; color: #b0b0c4; }
        .btn-delete-comment { background: transparent; border: none; color: #b0b0c4; cursor: pointer; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; transition: all 0.2s; }
        .btn-delete-comment:hover { color: #E94E8C; background: #fef0f4; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .comment-input-group input { flex: 1; min-width: 120px; border: 1.5px solid #e4e2ea; border-radius: 40px; padding: 6px 16px; font-size: 0.85rem; background: #faf9fc; transition: border-color 0.2s; }
        .comment-input-group input:focus { outline: none; border-color: #6C3CE1; }
        .comment-input-group input::placeholder { color: #b0b0c4; }
        .btn-comment-submit { background: #6C3CE1; color: #fff; border: none; padding: 6px 20px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: background 0.2s; }
        .btn-comment-submit:hover { background: #5a2fc9; }
        .empty-state { text-align: center; padding: 40px 20px; color: #8a8aa0; }
        .empty-state i { font-size: 2.4rem; color: #d5d0e0; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 0.95rem; }
        .footer { border-top: 1px solid #ececf0; padding: 18px 0; margin-top: auto; text-align: center; color: #8a8aa0; font-size: 0.8rem; }
        .loading { text-align: center; padding: 40px 20px; color: #8a8aa0; }
        .loading i { margin-right: 8px; }
        @media (max-width: 640px) {
            .page-header h1 { font-size: 1.6rem; }
            .post-form { padding: 16px; }
            .form-actions { flex-direction: column; align-items: stretch; }
            .btn-submit { width: 100%; justify-content: center; }
            .identity-bar { flex-direction: column; align-items: stretch; }
            .nav-links a { margin-left: 12px; font-size: 0.8rem; }
            .nav-links .btn-back { padding: 4px 12px; }
            .post-card { padding: 14px 16px; }
            .interact-bar { gap: 10px; }
            .btn-delete-post { margin-left: 0; }
            .admin-bar { flex-direction: column; align-items: stretch; }
            .admin-bar input { width: 100%; }
        }
    </style>
</head>
<body>

<nav class="container navbar">
    <a href="index.html" class="logo">✦ 橘川鹿囿</a>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="index.html#characters">角色</a>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 返回</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>🌿 社区留言板</h1>
        <p>互相评论 · 点赞 · 自由交流（数据云端存储）</p>
    </div>

    <!-- 管理员验证栏 -->
    <div class="admin-bar" id="adminBar">
        <span class="status" id="adminStatus"><i class="fas fa-lock"></i> 管理员模式：未验证</span>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <input type="password" id="adminPassword" placeholder="输入管理员密码" />
            <button class="btn-admin" id="adminBtn" onclick="toggleAdmin()">验证身份</button>
        </div>
    </div>

    <!-- 身份 -->
    <div class="identity-bar">
        <label><i class="fas fa-user-edit"></i> 昵称</label>
        <input type="text" id="nameInput" placeholder="给自己起个名字（留空显示'匿名'）" />
        <span class="badge" id="statusBadge">💡 可修改</span>
    </div>

    <!-- 发布 -->
    <div class="post-form">
        <textarea id="contentInput" placeholder="发布新内容…"></textarea>
        <div class="form-actions">
            <span class="hint"><i class="fas fa-cloud"></i> 数据存储在云端 · 所有人共享</span>
            <button class="btn-submit" onclick="publishPost()">
                <i class="fas fa-paper-plane" style="margin-right:8px;"></i>发布
            </button>
        </div>
    </div>

    <!-- 帖子列表 -->
    <div class="posts-section">
        <div class="section-header">
            <h2>📖 全部留言</h2>
            <span class="count" id="postCount">加载中...</span>
        </div>
        <div id="postList">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载留言中...</div>
        </div>
    </div>
</div>

<footer class="container footer">
    <span>© 2026 橘川鹿囿 · 社区留言板</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/leancloud-storage@5.0.0/dist/av-min.js"></script>
<script>
// ============================================================
// 🔑 在这里填入你的 LeanCloud 环境 ID
// ============================================================
const APP_ID = 'my-website-d8gotuhkv60560612';
// 注意：TCB 不需要 APP_KEY，LeanCloud 才需要。如果用 LeanCloud 请填写 APP_KEY。
// 但 LeanCloud 已关服，此版本为演示使用 localStorage 替代。
// 实际共享留言需要使用后端服务。

// ============================================================
// ⚠️ 重要：由于 LeanCloud 已关服，此版本暂时使用 localStorage
// 如需真正的共享留言，建议使用 Firebase 或 Supabase
// ============================================================

const STORAGE_KEY = 'juchuan_community_cloud';
const ADMIN_PASSWORD = '123456';

// ---------- 工具函数 ----------
function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function getTime() {
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getMyName() {
    return document.getElementById('nameInput').value.trim() || '匿名';
}

// ---------- 读写数据（模拟云端） ----------
function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch {
        return [];
    }
}

function saveData(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ---------- 昵称保存 ----------
document.getElementById('nameInput').addEventListener('change', function() {
    const val = this.value.trim();
    if (val) {
        localStorage.setItem('community_name', val);
        document.getElementById('statusBadge').textContent = '✅ 已保存';
        document.getElementById('statusBadge').style.background = '#2ecc71';
    } else {
        localStorage.removeItem('community_name');
        document.getElementById('statusBadge').textContent = '💡 匿名';
        document.getElementById('statusBadge').style.background = '#6C3CE1';
    }
});

(function() {
    const saved = localStorage.getItem('community_name');
    if (saved) {
        document.getElementById('nameInput').value = saved;
    }
})();

// ---------- 管理员 ----------
let isAdmin = false;

function toggleAdmin() {
    const input = document.getElementById('adminPassword');
    const btn = document.getElementById('adminBtn');
    const status = document.getElementById('adminStatus');

    if (isAdmin) {
        isAdmin = false;
        status.innerHTML = '<i class="fas fa-lock"></i> 管理员模式：未验证';
        btn.textContent = '验证身份';
        btn.className = 'btn-admin';
        document.getElementById('adminBar').style.borderColor = '#f0dca0';
        input.value = '';
        renderAll();
        return;
    }

    if (input.value === ADMIN_PASSWORD) {
        isAdmin = true;
        status.innerHTML = '<i class="fas fa-unlock" style="color:#2ecc71;"></i> 管理员模式：已验证 ✅';
        btn.textContent = '退出';
        btn.className = 'btn-admin logout';
        document.getElementById('adminBar').style.borderColor = '#2ecc71';
        input.value = '';
        renderAll();
    } else {
        alert('❌ 密码错误，请重试');
        input.value = '';
        input.focus();
    }
}

document.getElementById('adminPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') toggleAdmin();
});

// ---------- 发布 ----------
function publishPost() {
    const content = document.getElementById('contentInput').value.trim();
    if (!content) {
        alert('✏️ 写点内容再发布吧～');
        return;
    }
    const list = loadData();
    list.push({
        id: genId(),
        name: getMyName(),
        content: content,
        time: getTime(),
        likes: 0,
        likedUsers: [],
        comments: []
    });
    saveData(list);
    document.getElementById('contentInput').value = '';
    renderAll();
}

// ---------- 点赞 ----------
function toggleLike(postId) {
    const list = loadData();
    const post = list.find(p => p.id === postId);
    if (!post) return;
    const myName = getMyName();
    const idx = post.likedUsers.indexOf(myName);
    if (idx >= 0) {
        post.likedUsers.splice(idx, 1);
        post.likes = Math.max(0, post.likes - 1);
    } else {
        post.likedUsers.push(myName);
        post.likes += 1;
    }
    saveData(list);
    renderAll();
}

// ---------- 评论 ----------
function addComment(postId) {
    const input = document.getElementById('comment_input_' + postId);
    const text = input.value.trim();
    if (!text) {
        alert('✏️ 输入评论内容～');
        return;
    }
    const list = loadData();
    const post = list.find(p => p.id === postId);
    if (post) {
        post.comments.push({
            id: genId(),
            name: '匿名用户',
            content: text,
            time: getTime()
        });
        saveData(list);
        renderAll();
    }
}

// ---------- 删除 ----------
function deleteComment(postId, commentId) {
    if (!isAdmin) {
        alert('🔒 只有管理员可以删除评论，请先在顶部验证身份');
        return;
    }
    if (!confirm('确定删除这条评论吗？')) return;
    const list = loadData();
    const post = list.find(p => p.id === postId);
    if (post) {
        post.comments = post.comments.filter(c => c.id !== commentId);
        saveData(list);
        renderAll();
    }
}

function deletePost(postId) {
    if (!isAdmin) {
        alert('🔒 只有管理员可以删除帖子，请先在顶部验证身份');
        return;
    }
    if (!confirm('确定删除这条帖子吗？（会同时删除所有评论）')) return;
    let list = loadData();
    list = list.filter(p => p.id !== postId);
    saveData(list);
    renderAll();
}

function toggleComments(postId) {
    const area = document.getElementById('comments_area_' + postId);
    if (area) area.classList.toggle('open');
}

// ---------- 渲染 ----------
function renderAll() {
    const list = loadData();
    const container = document.getElementById('postList');
    const countEl = document.getElementById('postCount');

    countEl.textContent = '共 ' + list.length + ' 条';

    if (list.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><p>还没有留言～ 来发布第一条吧！</p></div>`;
        return;
    }

    const sorted = [...list].reverse();
    let html = '';
    sorted.forEach(p => {
        const isAnon = p.name === '匿名' || !p.name;
        const myName = getMyName();
        const liked = p.likedUsers && p.likedUsers.includes(myName);

        html += `
            <div class="post-card" id="post_${p.id}">
                <div class="meta">
                    <span class="name ${isAnon ? 'anonymous' : ''}">
                        <i class="fas ${isAnon ? 'fa-user-secret' : 'fa-user'}"></i>
                        ${escapeHtml(p.name)}
                    </span>
                    <span class="time"><i class="far fa-clock"></i> ${p.time}</span>
                </div>
                <div class="content">${escapeHtml(p.content)}</div>
                <div class="interact-bar">
                    <button class="btn-like ${liked ? 'liked' : ''}" onclick="toggleLike('${p.id}')">
                        <i class="fas fa-heart"></i> <span class="count">${p.likes || 0}</span>
                    </button>
                    <button class="btn-comment-toggle" onclick="toggleComments('${p.id}')">
                        <i class="fas fa-comment"></i> <span>${p.comments ? p.comments.length : 0}</span>
                    </button>
                    ${isAdmin ? `<button class="btn-delete-post" onclick="deletePost('${p.id}')"><i class="fas fa-trash-alt"></i> 删除</button>` : ''}
                </div>
                <div class="comments-area" id="comments_area_${p.id}">
                    ${(p.comments && p.comments.length > 0) ? p.comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-body">
                                <span class="comment-name"><i class="fas fa-user-secret"></i> 匿名用户</span>
                                <span class="comment-time"> · ${c.time}</span>
                                <div class="comment-text">${escapeHtml(c.content)}</div>
                            </div>
                            ${isAdmin ? `<button class="btn-delete-comment" onclick="deleteComment('${p.id}','${c.id}')"><i class="fas fa-times"></i></button>` : ''}
                        </div>
                    `).join('') : ''}
                    <div class="comment-input-group">
                        <input type="text" id="comment_input_${p.id}" placeholder="写评论…（匿名发布）" />
                        <button class="btn-comment-submit" onclick="addComment('${p.id}')"><i class="fas fa-reply"></i> 评论</button>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

// ---------- 初始化 ----------
document.addEventListener('DOMContentLoaded', function() {
    renderAll();
});
</script>
</body>
</html>
